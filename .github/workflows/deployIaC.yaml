name: IaC Deployment
env:
  RESOURCE_GROUP: 'rg-optevo-dev'        # your existing RG
  CLUSTER_NAME: 'arckoptevocusdev' # your existing AKS name
  REGISTRY: ghcr.io
  IMAGE_NAME: "${{ github.repository }}"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'runner/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-runners:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Az CLI login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Point to your EXISTING cluster — no Bicep deploy step
      - name: Set AKS context
        id: set-context
        uses: azure/aks-set-context@v3
        with:
          resource-group: '${{ env.RESOURCE_GROUP }}'
          cluster-name: '${{ env.CLUSTER_NAME }}'

      - name: Install Runner
        run: |
          kubectl apply -f ./runner/cert-manager.yaml
          kubectl create -f ./runner/actions-runner-controller.yaml
          kubectl create secret generic controller-manager \
            -n actions-runner-system \
            --from-literal=github_token=${{ secrets.RUNNER_TOKEN }}
          sleep 90
          kubectl apply -f ./runner/runnerdeployment.yaml
          kubectl apply -f ./runner/hra-scaler.yaml